name: utaite
description: utaite

version: 1.0.0+1

environment:
  sdk: '>=2.12.0-29.10.beta <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^7.0.0-nullsafety.0
  http: ^0.12.2
  intl: ^0.17.0-nullsafety.2
  rxdart: ^0.26.0-nullsafety.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  pedantic: ^1.10.0-nullsafety

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/

analyzer:
  exclude: [ build/** ]
  strong-mode:
    implicit-casts: false
    implicit-dynamic: false
  enable-experiment:
    - non-nullable
